services:

  # ── LaravelApp ────────────────────────────────────────────────────────────
  app:
    build: .
    container_name: devspot-app
    restart: unless-stopped
    ports:
      - "8010:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks: [internal]

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [internal]

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:latest
    restart: unless-stopped
    container_name: devspot-redis
    networks: [internal]


networks:
  internal:

volumes:
  postgres-data:
