services:

  # ── Laravel app (PHP-FPM + Nginx bundled via serversideup) ───────────────
  # Exposed on 127.0.0.1:8010 — the host nginx proxies to this port
  app:
    build: .
    image: devspot-api:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "127.0.0.1:8010:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [internal]

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [internal]


networks:
  internal:

volumes:
  postgres-data:
