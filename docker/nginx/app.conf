# ─────────────────────────────────────────────────────────────────────────────
# STEP 1 — Before SSL cert: HTTP only
#           After cert obtained → uncomment HTTPS block + redirect, remove proxy
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name YOUR_DOMAIN;  # ex: api.devspot.fr

    # Required for Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── STEP 2: Uncomment this after SSL cert obtained ──────────────────────
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # ── STEP 1 only: direct HTTP proxy (remove after SSL configured) ────────
    location / {
        proxy_pass         http://app:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

