services:
  redis:
    image: redis:latest
    container_name: devspot-redis
    ports:
        - '6379:6379'
    volumes:
        - redis-data:/data
    restart: unless-stopped
  postgres:
    image: postgres:17-alpine
    container_name: devspot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
  adminer:
    image: adminer:latest
    container_name: devspot_adminer
    restart: unless-stopped
    profiles: [tools]
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy


volumes:
  postgres_data:
    driver: local
  redis-data:
    driver: local
